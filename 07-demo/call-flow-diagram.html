<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Interactive visualization of the Paytm Merchant Travel Desk voice agent's 5-stage call flow with 18 failure modes and recovery paths." />
  <title>Paytm Voice Agent — Call Flow Diagram</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap"
    rel="stylesheet"
  />

  <style>
    /* ---------- Design tokens ---------- */
    :root {
      --c-bg: #f5f7fa;
      --c-surface: #ffffff;
      --c-surface-alt: #fafbfd;
      --c-border: #e4e8ef;
      --c-border-strong: #cdd4e0;
      --c-text: #1a2236;
      --c-text-muted: #5b6577;
      --c-text-soft: #8893a6;

      /* Paytm palette */
      --c-stage: #002970;
      --c-stage-hover: #003a9b;
      --c-accent: #00baf2;

      /* Failure categories */
      --c-voice: #f7941d;
      --c-nlu: #7b61ff;
      --c-api: #d62b2b;
      --c-cross: #6b7280;
      --c-ok: #00a651;

      /* Channel badges */
      --c-ch-voice: #00a651;
      --c-ch-wa: #25d366;
      --c-ch-sms: #5b8def;
      --c-ch-human: #f7941d;

      --shadow-1: 0 1px 2px rgba(16, 24, 40, 0.06), 0 1px 3px rgba(16, 24, 40, 0.1);
      --shadow-2: 0 4px 8px rgba(16, 24, 40, 0.08), 0 12px 24px rgba(16, 24, 40, 0.08);
      --shadow-panel: 0 -4px 24px rgba(16, 24, 40, 0.08);

      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;

      --ff-sans: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
      --ff-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
    }

    /* ---------- Base reset ---------- */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--ff-sans);
      color: var(--c-text);
      background: var(--c-bg);
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    h1, h2, h3, h4, p { margin: 0; }
    button {
      font: inherit;
      color: inherit;
      background: none;
      border: none;
      cursor: pointer;
    }

    /* ---------- Header ---------- */
    .app-header {
      background: linear-gradient(135deg, var(--c-stage) 0%, #001a48 100%);
      color: #fff;
      padding: 20px 28px;
      box-shadow: var(--shadow-1);
    }
    .app-header__inner {
      max-width: 1440px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 24px;
      flex-wrap: wrap;
    }
    .app-header__eyebrow {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--c-accent);
      margin-bottom: 4px;
    }
    .app-header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .app-header__meta {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.72);
      font-weight: 500;
    }

    /* ---------- Main layout ---------- */
    .app-main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 20px 28px 24px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    /* ---------- Time budget bar ---------- */
    #time-budget-bar {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      box-shadow: var(--shadow-1);
    }

    /* ---------- Diagram canvas ---------- */
    #diagram-container {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-1);
      overflow: hidden;
      position: relative;
    }
    #diagram-svg {
      display: block;
      width: 100%;
      height: auto;
      background:
        radial-gradient(circle at 1px 1px, rgba(16, 24, 40, 0.05) 1px, transparent 0) 0 0 / 24px 24px,
        var(--c-surface);
    }

    /* SVG node styles (applied via classes in Steps 6–7) */
    .stage-node rect {
      fill: var(--c-stage);
      stroke: transparent;
      stroke-width: 2;
      filter: drop-shadow(0 2px 4px rgba(0, 41, 112, 0.25));
      transition: fill 180ms ease, stroke 180ms ease, transform 180ms ease;
      cursor: pointer;
    }
    .stage-node:hover rect { fill: var(--c-stage-hover); }
    .stage-node.is-selected rect { stroke: var(--c-accent); stroke-width: 3; }
    .stage-node text { fill: #fff; pointer-events: none; }

    .fm-node rect {
      fill: #fff;
      stroke-width: 1.5;
      transition: transform 180ms ease, stroke-width 180ms ease;
      cursor: pointer;
    }
    .fm-node--voice rect { stroke: var(--c-voice); }
    .fm-node--nlu rect   { stroke: var(--c-nlu); }
    .fm-node--api rect   { stroke: var(--c-api); }
    .fm-node--ok rect    { stroke: var(--c-ok); }
    .fm-node--cross rect { stroke-dasharray: 4 3; stroke: var(--c-cross); }
    .fm-node:hover rect  { stroke-width: 2.5; }
    .fm-node.is-selected rect { stroke-width: 3; filter: drop-shadow(0 2px 6px rgba(16, 24, 40, 0.18)); }
    .fm-node text { pointer-events: none; }
    .fm-node .fm-id { font-family: var(--ff-mono); font-size: 10px; font-weight: 600; }

    .connector-happy {
      fill: none;
      stroke: var(--c-accent);
      stroke-width: 2.5;
      marker-end: url(#arrow-happy);
      transition: opacity 180ms ease;
    }
    .connector-fm {
      fill: none;
      stroke: var(--c-border-strong);
      stroke-width: 1.25;
      stroke-dasharray: 3 3;
      transition: stroke 180ms ease, opacity 180ms ease;
    }
    .connector-fm.is-active { stroke: var(--c-accent); stroke-dasharray: none; stroke-width: 2; }

    .is-dimmed { opacity: 0.28; }

    /* ---------- Detail panel ---------- */
    .detail-panel {
      position: fixed;
      right: 24px;
      bottom: 24px;
      width: min(420px, calc(100vw - 48px));
      max-height: calc(100vh - 48px);
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-2);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transform: translateY(8px);
      opacity: 0;
      transition: transform 220ms ease, opacity 220ms ease;
      z-index: 50;
    }
    .detail-panel:not([hidden]) { opacity: 1; transform: translateY(0); }
    .detail-panel__header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--c-border);
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .detail-panel__badge {
      font-family: var(--ff-mono);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--c-surface-alt);
      border: 1px solid var(--c-border);
      color: var(--c-text-muted);
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    .detail-panel__close {
      margin-left: auto;
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      color: var(--c-text-soft);
      display: grid;
      place-items: center;
    }
    .detail-panel__close:hover { background: var(--c-surface-alt); color: var(--c-text); }
    .detail-panel__title { font-size: 16px; font-weight: 700; letter-spacing: -0.005em; }
    .detail-panel__subtitle { font-size: 12px; color: var(--c-text-muted); margin-top: 2px; }
    .detail-panel__body {
      padding: 16px 20px 20px;
      overflow-y: auto;
      font-size: 13px;
    }
    .detail-panel__section { margin-bottom: 14px; }
    .detail-panel__section:last-child { margin-bottom: 0; }
    .detail-panel__label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--c-text-soft);
      margin-bottom: 4px;
    }

    /* Recovery cascade */
    .recovery-step {
      display: flex;
      gap: 10px;
      padding: 8px 10px;
      border-left: 3px solid var(--c-border-strong);
      margin-bottom: 6px;
      background: var(--c-surface-alt);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }
    .recovery-step__channel {
      font-family: var(--ff-mono);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      color: #fff;
      height: fit-content;
      flex-shrink: 0;
    }
    .recovery-step--voice  .recovery-step__channel { background: var(--c-ch-voice); }
    .recovery-step--wa     .recovery-step__channel { background: var(--c-ch-wa); }
    .recovery-step--sms    .recovery-step__channel { background: var(--c-ch-sms); }
    .recovery-step--human  .recovery-step__channel { background: var(--c-ch-human); }
    .recovery-step__text   { font-size: 12.5px; color: var(--c-text); }

    .freq-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }
    .freq-bar__track {
      flex: 1;
      height: 6px;
      background: var(--c-surface-alt);
      border: 1px solid var(--c-border);
      border-radius: 999px;
      overflow: hidden;
    }
    .freq-bar__fill { height: 100%; background: var(--c-accent); }

    /* ---------- Footer ---------- */
    .app-footer {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 28px 32px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .legend, .circuit-breakers {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      box-shadow: var(--shadow-1);
    }
    .legend__title, .circuit-breakers__title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--c-text-soft);
      margin-bottom: 10px;
    }
    .legend__items { display: flex; flex-wrap: wrap; gap: 10px 18px; }
    .legend__item { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
    .legend__swatch {
      width: 14px; height: 14px; border-radius: 4px;
      border: 1.5px solid; background: #fff;
    }
    .legend__swatch--stage { background: var(--c-stage); border-color: var(--c-stage); }
    .legend__swatch--voice { border-color: var(--c-voice); }
    .legend__swatch--nlu   { border-color: var(--c-nlu); }
    .legend__swatch--api   { border-color: var(--c-api); }
    .legend__swatch--ok    { border-color: var(--c-ok); }
    .legend__swatch--cross { border-color: var(--c-cross); border-style: dashed; }

    .circuit-breakers__toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      text-align: left;
      color: var(--c-text);
      font-weight: 600;
      font-size: 13px;
    }
    .circuit-breakers__toggle::after {
      content: "▸";
      margin-left: auto;
      transition: transform 160ms ease;
      color: var(--c-text-soft);
    }
    .circuit-breakers.is-open .circuit-breakers__toggle::after { transform: rotate(90deg); }
    .circuit-breakers__body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 220ms ease;
    }
    .circuit-breakers.is-open .circuit-breakers__body { max-height: 600px; }

    /* ---------- Responsive ---------- */
    @media (max-width: 1200px) {
      .detail-panel {
        right: 16px;
        left: 16px;
        bottom: 16px;
        width: auto;
        max-height: 60vh;
      }
      .app-footer { grid-template-columns: 1fr; }
    }
    @media (max-width: 900px) {
      .app-header h1 { font-size: 18px; }
      .app-main, .app-footer { padding-left: 16px; padding-right: 16px; }
      #diagram-container { overflow-x: auto; }
      #diagram-svg { min-width: 1100px; }
    }

    /* ---------- Print ---------- */
    @media print {
      body { background: #fff; }
      .detail-panel, .circuit-breakers { display: none !important; }
      .app-header { background: #fff; color: var(--c-text); box-shadow: none; border-bottom: 1px solid var(--c-border); }
      #diagram-container { page-break-inside: avoid; box-shadow: none; }
    }

    /* ---------- Entry animation ---------- */
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeSlide 320ms ease both; }
  </style>
</head>
<body>
  <noscript>
    <div style="padding:24px;font-family:system-ui,sans-serif;max-width:600px;margin:40px auto;border:1px solid #ddd;border-radius:8px;">
      <h2>JavaScript required</h2>
      <p>This interactive diagram needs JavaScript and network access to load D3.js from its CDN. Please enable JavaScript and refresh the page.</p>
    </div>
  </noscript>

  <header class="app-header">
    <div class="app-header__inner">
      <div class="app-header__title">
        <span class="app-header__eyebrow">Paytm Merchant Travel Desk</span>
        <h1>5-Stage Call Flow &amp; Failure Modes</h1>
      </div>
      <div class="app-header__meta">
        <span>Voice-first booking · 100s target · 18 failure modes</span>
      </div>
    </div>
  </header>

  <main class="app-main">
    <section id="time-budget-bar" aria-label="Call time budget">
      <!-- Time budget bar — populated in Step 5 -->
    </section>

    <section id="diagram-container" aria-label="Call flow diagram">
      <svg id="diagram-svg" viewBox="0 0 1400 900" role="img" aria-label="5-stage call flow with failure modes">
        <!-- SVG diagram — populated in Steps 6–7 -->
      </svg>
    </section>

    <aside id="detail-panel" class="detail-panel" aria-live="polite" hidden>
      <!-- Detail panel — populated in Step 9 -->
    </aside>
  </main>

  <footer class="app-footer">
    <div id="legend" class="legend" aria-label="Legend">
      <!-- Legend — populated in Step 10 -->
    </div>

    <div id="circuit-breakers" class="circuit-breakers" aria-label="Circuit breaker patterns">
      <!-- Circuit breaker panel — populated in Step 11 -->
    </div>
  </footer>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    // Bootstrap check — fails loudly if D3 did not load from the CDN
    (function () {
      if (typeof window.d3 === 'undefined') {
        document.body.innerHTML =
          '<div style="padding:24px;font-family:system-ui,sans-serif;max-width:600px;margin:40px auto;border:1px solid #ddd;border-radius:8px;">' +
          '<h2>Unable to load D3.js</h2>' +
          '<p>This page loads D3.js v7 from <code>https://d3js.org/d3.v7.min.js</code>. Check your internet connection and reload.</p>' +
          '</div>';
      }
    })();

    // ---------- Stage data (minimal) ----------
    const STAGE_W = 200;
    const STAGE_H = 100;
    const STAGE_CY = 200;

    const stages = [
      { id: "stage-1", num: 1, name: "Identity & Intent",      timeRange: "0–15s",   cx: 140  },
      { id: "stage-2", num: 2, name: "Trip Search",            timeRange: "15–45s",  cx: 400  },
      { id: "stage-3", num: 3, name: "Booking Confirmation",   timeRange: "45–75s",  cx: 660  },
      { id: "stage-4", num: 4, name: "GST + Invoice",          timeRange: "75–90s",  cx: 920  },
      { id: "stage-5", num: 5, name: "Summary & Exit",         timeRange: "90–100s", cx: 1180 }
    ];

    // ---------- SVG setup ----------
    const svg = d3.select("#diagram-svg");

    const defs = svg.append("defs");
    defs.append("marker")
      .attr("id", "arrow-happy")
      .attr("viewBox", "0 0 10 10")
      .attr("refX", 9)
      .attr("refY", 5)
      .attr("markerWidth", 8)
      .attr("markerHeight", 8)
      .attr("orient", "auto-start-reverse")
      .append("path")
        .attr("d", "M0,0 L10,5 L0,10 z")
        .attr("fill", "var(--c-accent)");

    // ---------- Happy-path connectors (rendered first so stages cover edges) ----------
    const connectorsLayer = svg.append("g").attr("class", "connectors-layer");

    for (let i = 0; i < stages.length - 1; i++) {
      const a = stages[i];
      const b = stages[i + 1];
      const x1 = a.cx + STAGE_W / 2;
      const x2 = b.cx - STAGE_W / 2 - 4;
      connectorsLayer.append("path")
        .attr("class", "connector-happy")
        .attr("d", `M${x1},${STAGE_CY} L${x2},${STAGE_CY}`);
    }

    // ---------- Stage nodes ----------
    const stagesLayer = svg.append("g").attr("class", "stages-layer");

    const stageG = stagesLayer.selectAll("g.stage-node")
      .data(stages, d => d.id)
      .join("g")
        .attr("class", "stage-node")
        .attr("transform", d => `translate(${d.cx - STAGE_W / 2}, ${STAGE_CY - STAGE_H / 2})`)
        .attr("tabindex", 0)
        .attr("role", "button")
        .attr("aria-label", d => `Stage ${d.num}: ${d.name}, ${d.timeRange}`);

    stageG.append("rect")
      .attr("width", STAGE_W)
      .attr("height", STAGE_H)
      .attr("rx", 12)
      .attr("ry", 12);

    // Stage number pill
    stageG.append("circle")
      .attr("cx", 18)
      .attr("cy", 18)
      .attr("r", 12)
      .attr("fill", "rgba(255,255,255,0.16)")
      .attr("stroke", "rgba(255,255,255,0.35)")
      .attr("stroke-width", 1);
    stageG.append("text")
      .attr("x", 18)
      .attr("y", 18)
      .attr("text-anchor", "middle")
      .attr("dominant-baseline", "central")
      .attr("font-size", 11)
      .attr("font-weight", 700)
      .attr("fill", "#fff")
      .text(d => d.num);

    // Stage name (supports 2-line wrapping for long names)
    stageG.each(function (d) {
      const g = d3.select(this);
      const words = d.name.split(" ");
      // Simple heuristic: wrap at first space if name is long
      let lines = [d.name];
      if (d.name.length > 14) {
        const mid = Math.ceil(words.length / 2);
        lines = [words.slice(0, mid).join(" "), words.slice(mid).join(" ")];
      }
      const nameY = STAGE_H / 2 - 4 - (lines.length - 1) * 8;
      lines.forEach((line, i) => {
        g.append("text")
          .attr("x", STAGE_W / 2)
          .attr("y", nameY + i * 16)
          .attr("text-anchor", "middle")
          .attr("dominant-baseline", "central")
          .attr("font-size", 14)
          .attr("font-weight", 600)
          .attr("fill", "#fff")
          .text(line);
      });
    });

    // Time range (below the name)
    stageG.append("text")
      .attr("x", STAGE_W / 2)
      .attr("y", STAGE_H - 18)
      .attr("text-anchor", "middle")
      .attr("dominant-baseline", "central")
      .attr("font-size", 11)
      .attr("font-weight", 500)
      .attr("fill", "rgba(255,255,255,0.78)")
      .attr("letter-spacing", "0.03em")
      .text(d => d.timeRange);
  </script>
</body>
</html>
